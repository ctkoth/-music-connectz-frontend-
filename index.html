<style>
:root {
  --purple: #9b59ff;
  --purple-dark: #6b2fc7;
  --cyan: #4dffea;
  --pink: #ff4d9d;
  --lime: #b3ff4d;
  --orange: #ff9b4d;
  --yellow: #ffd84d;
  --bg-deep: #0a0118;
  --bg-mid: #1a0a2e;
  --surface: rgba(155, 89, 255, 0.08);
  --border-soft: rgba(155, 89, 255, 0.22);
  --text: #ffffff;
  --text-sec: rgba(255, 255, 255, 0.7);
  --text-muted: rgba(255, 255, 255, 0.4);
  --error: #ef4444;
  --success: #10b981;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #000; color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }

/* Background layers — image + neon gradients overlaid · falls back to gradients if image missing */
body {
  display: flex; align-items: center; justify-content: center; padding: 20px;
  background:
    radial-gradient(circle at 15% 25%, rgba(155, 89, 255, 0.20) 0%, transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(77, 255, 234, 0.15) 0%, transparent 40%),
    radial-gradient(ellipse at top, var(--bg-mid) 0%, var(--bg-deep) 50%, #000 100%);
  position: relative; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background-image: url('/icons/background.png');
  background-size: cover; background-position: center; background-repeat: no-repeat;
  opacity: 0.25;
  filter: blur(2px) saturate(1.2);
  pointer-events: none;
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(180deg, rgba(10,1,24,0.4) 0%, rgba(10,1,24,0.6) 50%, rgba(0,0,0,0.85) 100%);
  pointer-events: none;
}
.font-display { font-family: 'Audiowide', sans-serif; }
.card {
  position: relative; z-index: 10; width: 100%; max-width: 400px;
  background: rgba(10, 1, 24, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-soft); border-radius: 24px; padding: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}
.header { text-align: center; margin-bottom: 20px; }
.header-emoji { font-size: 36px; filter: drop-shadow(0 0 12px var(--purple)); margin-bottom: 8px; line-height: 1; }
.header-logo { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 0 16px var(--purple)); margin: 0 auto 8px; display: block; border-radius: 14px; }
.header-brand {
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.tabs {
  display: flex; padding: 4px; border-radius: 12px; margin-bottom: 16px;
  background: var(--surface); border: 1px solid var(--border-soft);
}
.tab {
  flex: 1; padding: 8px; border-radius: 8px; border: none; cursor: pointer;
  font-family: inherit; font-size: 11px; letter-spacing: 0.05em; font-weight: 600;
  background: transparent; color: var(--text-sec); transition: all 0.2s;
}
.tab.active {
  background: linear-gradient(135deg, var(--purple), var(--purple-dark));
  color: white; font-weight: 700; box-shadow: 0 4px 12px rgba(155, 89, 255, 0.3);
}
.oauth-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px;
}
.oauth-btn {
  aspect-ratio: 1; border-radius: 12px; border: 1px solid var(--border-soft);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
}
.oauth-btn:hover { box-shadow: 0 0 16px rgba(155, 89, 255, 0.3); }
.oauth-btn:active { transform: scale(0.92); }
.oauth-btn svg { width: 20px; height: 20px; pointer-events: none; }
.divider {
  display: flex; align-items: center; gap: 12px; margin: 14px 0 12px;
}
.divider-line { flex: 1; height: 1px; background: var(--border-soft); }
.divider-text {
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-muted); opacity: 0.7;
}
.msg {
  padding: 10px 12px; border-radius: 8px; font-size: 11px; margin-bottom: 12px;
}
.msg-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
.msg-info { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); color: #93c5fd; }
.msg-success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7; }
.field { margin-bottom: 10px; }
.field-label {
  display: block; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  font-weight: 600; color: var(--text-sec); margin-bottom: 6px;
}
.field-input {
  width: 100%; padding: 10px 12px; border-radius: 8px; font-family: inherit;
  font-size: 13px; background: var(--surface); color: var(--text);
  border: 1px solid var(--border-soft); outline: none; transition: border 0.2s, box-shadow 0.2s;
}
.field-input:focus {
  border-color: var(--purple); box-shadow: 0 0 0 3px rgba(155, 89, 255, 0.15);
}
.btn-primary {
  width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
  font-family: inherit; font-size: 12px; letter-spacing: 0.1em; font-weight: 700;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  color: #000; margin-top: 6px; transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 0 16px rgba(155, 89, 255, 0.4);
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost {
  width: 100%; padding: 10px; border-radius: 8px; cursor: pointer;
  font-family: inherit; font-size: 11px; letter-spacing: 0.1em; font-weight: 600;
  background: transparent; color: var(--text-sec);
  border: 1px solid var(--border-soft); transition: all 0.2s;
}
.btn-ghost:hover { background: var(--surface); color: var(--text); }
.footer {
  font-size: 9px; text-align: center; color: var(--text-muted);
  line-height: 1.5; margin-top: 14px;
}
.footer a { color: var(--cyan); text-decoration: none; }
@media (max-width: 360px) {
  .oauth-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .oauth-btn svg { width: 18px; height: 18px; }
}
</style>

<script>
// ============================================================================
// Music ConnectZ — Login Gate (vanilla JS)
// Drop-in standalone login page. Works with or without backend.
// ============================================================================
const API_BASE = ''; // same-origin — assumes Vercel rewrite or backend on same domain
const TOKEN_KEY = 'mcz:token';
const REFRESH_KEY = 'mcz:refresh';
let mode = 'login';

function setMode(newMode) {
  mode = newMode;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  document.getElementById('field-phone').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('field-confirm').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('submit-btn').textContent = mode === 'login' ? 'Sign In →' : 'Create Account →';
  document.getElementById('divider-text').textContent = `or ${mode === 'login' ? 'sign in' : 'register'} with email`;
  document.getElementById('password').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
  clearMsg();
}

function showMsg(text, type = 'info') {
  document.getElementById('msg-container').innerHTML = `<div class="msg msg-${type}">${text}</div>`;
}
function clearMsg() { document.getElementById('msg-container').innerHTML = ''; }

// Check for OAuth callback in URL hash (e.g., #access=jwt&refresh=jwt)
function checkOAuthCallback() {
  const hash = window.location.hash.slice(1);
  if (!hash) return false;
  const params = new URLSearchParams(hash);
  const access = params.get('access');
  const refresh = params.get('refresh');
  if (access) {
    localStorage.setItem(TOKEN_KEY, access);
    if (refresh) localStorage.setItem(REFRESH_KEY, refresh);
    showMsg('✓ Signed in! Redirecting…', 'success');
    setTimeout(() => { window.location.href = '/home'; }, 800);
    return true;
  }
  const err = params.get('oauth_error');
  if (err) showMsg(`OAuth error: ${err}`, 'error');
  return false;
}

async function oauth(provider) {
  clearMsg();
  showMsg(`Redirecting to ${provider}…`, 'info');
  // Vercel proxy: /api/* → admin.musicconnectz.net/api/*
  const returnTo = encodeURIComponent(window.location.origin + '/home');
  window.location.href = `/api/auth/oauth/${provider}/start/?return_to=${returnTo}`;
}

function guestLogin() {
  localStorage.setItem('mcz:guest', '1');
  showMsg('✓ Continuing as guest…', 'success');
  setTimeout(() => { window.location.href = '/home'; }, 600);
}

document.getElementById('auth-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMsg();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const submitBtn = document.getElementById('submit-btn');

  if (mode === 'login') {
    if (!username && !email) return showMsg('Username or email required.', 'error');
    if (!password) return showMsg('Password required.', 'error');
  } else {
    if (!username) return showMsg('Username required.', 'error');
    if (!email) return showMsg('Email required.', 'error');
    if (!phone) return showMsg('Phone required.', 'error');
    if (!password) return showMsg('Password required.', 'error');
    if (password !== confirm) return showMsg("Passwords don't match.", 'error');
    if (password.length < 8) return showMsg('Password must be 8+ characters.', 'error');
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '⏳ Loading…';

  try {
    const endpoint = mode === 'login' ? '/api/auth/login/' : '/api/auth/register/';
    const body = mode === 'login'
      ? { username: username || email, password }
      : { username, email, phone, password };

    const res = await fetch(API_BASE + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({ error: 'Unknown error' }));
      throw new Error(data.error || data.detail || `Failed (${res.status})`);
    }
    const data = await res.json();
    if (data.access) localStorage.setItem(TOKEN_KEY, data.access);
    if (data.refresh) localStorage.setItem(REFRESH_KEY, data.refresh);
    showMsg('✓ Success! Redirecting…', 'success');
    setTimeout(() => { window.location.href = '/home'; }, 600);
  } catch (err) {
    // Backend unreachable — fall back to demo mode
    if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
      showMsg('Backend not reachable — entering demo mode…', 'info');
      localStorage.setItem('mcz:demo-user', JSON.stringify({ username: username || email, email, phone }));
      setTimeout(() => { window.location.href = '/home'; }, 800);
    } else {
      showMsg(err.message, 'error');
    }
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = mode === 'login' ? 'Sign In →' : 'Create Account →';
  }
});

// Check for OAuth callback on page load
checkOAuthCallback();
</script>
